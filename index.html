<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Market Andreia - Sistem de Evaluări">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Market Andreia - Evaluări</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen" class="screen active">
        <div class="splash-container">
            <img src="logo.png" alt="Market Andreia Logo" class="logo" onclick="goToMenu()">
            <p class="tap-text">Atingeți logourile pentru a continua</p>
        </div>
    </div>

    <!-- Menu Screen -->
    <div id="menuScreen" class="screen">
        <div class="menu-container">
            <h1>Market Andreia</h1>
            <p class="menu-subtitle">Alegeți o opțiune:</p>
            <div class="buttons-container">
                <button class="menu-btn reviews-btn" onclick="goToReviews()">
                    <span class="btn-icon">⭐</span>
                    <span class="btn-text">Evaluări</span>
                </button>
                <button class="menu-btn product-btn" onclick="goToProduct()">
                    <span class="btn-icon">💡</span>
                    <span class="btn-text">Sugerează Produs</span>
                </button>
                <button class="menu-btn employee-btn" onclick="goToEmployee()">
                    <span class="btn-icon">👤</span>
                    <span class="btn-text">Evaluarea Angajatului</span>
                </button>
            </div>
            <button class="back-btn" onclick="goToMenu()">← Înapoi la Meniu</button>
        </div>
    </div>

    <!-- Reviews Form -->
    <div id="reviewsScreen" class="screen">
        <div class="form-container">
            <h2>Evaluări</h2>
            <form id="reviewsForm">
                <div class="form-group">
                    <label>Clasificare:</label>
                    <div class="rating-container">
                        <button type="button" class="star" onclick="setRating(1, 'reviews')">⭐</button>
                        <button type="button" class="star" onclick="setRating(2, 'reviews')">⭐</button>
                        <button type="button" class="star" onclick="setRating(3, 'reviews')">⭐</button>
                        <button type="button" class="star" onclick="setRating(4, 'reviews')">⭐</button>
                        <button type="button" class="star" onclick="setRating(5, 'reviews')">⭐</button>
                    </div>
                    <input type="hidden" id="reviewsRating" name="rating" required>
                </div>

                <div class="form-group">
                    <label for="reviewsFeedback">Feedback/Comentariu:</label>
                    <textarea id="reviewsFeedback" name="feedback" placeholder="Scrieți comentariul dvs. aici..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Trimitere Evaluare</button>
                <button type="button" class="back-btn" onclick="goToMenu()">← Înapoi la Meniu</button>
            </form>
        </div>
    </div>

    <!-- Product Suggestion Form -->
    <div id="productScreen" class="screen">
        <div class="form-container">
            <h2>Sugerează Produs</h2>
            <form id="productForm">
                <div class="form-group">
                    <label for="productSuggestion">Ce ați dori să avem în magazin?</label>
                    <textarea id="productSuggestion" name="suggestion" placeholder="Descrieți produsul pe care ați dori să-l vedeți în magazinul nostru..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Trimitere Sugestie</button>
                <button type="button" class="back-btn" onclick="goToMenu()">← Înapoi la Meniu</button>
            </form>
        </div>
    </div>

    <!-- Employee Review Form -->
    <div id="employeeScreen" class="screen">
        <div class="form-container">
            <h2>Evaluarea Angajatului</h2>
            <form id="employeeForm">
                <div class="form-group">
                    <label for="employeeName">Numele Angajatului:</label>
                    <input type="text" id="employeeName" name="employeeName" placeholder="Introduceți numele angajatului" required>
                </div>

                <div class="form-group">
                    <label>Clasificare:</label>
                    <div class="rating-container">
                        <button type="button" class="star" onclick="setRating(1, 'employee')">⭐</button>
                        <button type="button" class="star" onclick="setRating(2, 'employee')">⭐</button>
                        <button type="button" class="star" onclick="setRating(3, 'employee')">⭐</button>
                        <button type="button" class="star" onclick="setRating(4, 'employee')">⭐</button>
                        <button type="button" class="star" onclick="setRating(5, 'employee')">⭐</button>
                    </div>
                    <input type="hidden" id="employeeRating" name="rating" required>
                </div>

                <div class="form-group">
                    <label for="employeeFeedback">Feedback/Comentariu:</label>
                    <textarea id="employeeFeedback" name="feedback" placeholder="Scrieți comentariul dvs. aici..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Trimitere Evaluare</button>
                <button type="button" class="back-btn" onclick="goToMenu()">← Înapoi la Meniu</button>
            </form>
        </div>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="success-popup hidden">
        <div class="success-content">
            <p>✓ Trimis cu succes!</p>
            <p class="success-subtitle">Mulțumim pentru feedback-ul dvs.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
